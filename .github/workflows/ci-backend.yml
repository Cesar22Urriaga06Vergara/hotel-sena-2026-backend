name: CI — Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  lint-and-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔍 Lint (ESLint)
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Tests unitarios
        run: npm run test
        continue-on-error: true

      - name: 📊 Code coverage (opcional)
        run: npm run test:cov
        continue-on-error: true

      - name: 🏗️ Build de producción
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-dist
          path: dist/
          retention-days: 5

  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔐 Audit de dependencias
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: 📝 Generar reporte de dependencias
        run: npm ls --all > dependencies.txt
        continue-on-error: true

      - name: 📤 Upload dependencies report
        uses: actions/upload-artifact@v3
        with:
          name: dependencies-report
          path: dependencies.txt
          retention-days: 5

  notifications:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [lint-and-build, security-scan]
    if: always()
    
    steps:
      - name: ✅ Build Success
        if: success()
        run: echo "✅ Backend CI pipeline completed successfully!"
      
      - name: ❌ Build Failed
        if: failure()
        run: echo "❌ Backend CI pipeline failed. Check logs for details." && exit 1
